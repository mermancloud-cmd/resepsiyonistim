services:
  bungalov-db:
    build:
      context: ./sqlite-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_PATH: /data/bungalov.db
      BUNGALOV_DB_API_KEY: "${BUNGALOV_DB_API_KEY:-}"
    volumes:
      - bungalov_data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    restart: unless-stopped
    ports:
      - "${N8N_LOCAL_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n
      GENERIC_TIMEZONE: "${GENERIC_TIMEZONE:-Europe/Istanbul}"
      TZ: "${GENERIC_TIMEZONE:-Europe/Istanbul}"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
    depends_on:
      postgres:
        condition: service_healthy
      bungalov-db:
        condition: service_started

volumes:
  bungalov_data:
  n8n_data:
  postgres_data:
