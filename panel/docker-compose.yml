services:
  resepsiyonistim:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.resepsiyonistim.rule=Host(`resepsiyonistim.com`) || Host(`www.resepsiyonistim.com`)"
      - "traefik.http.routers.resepsiyonistim.entrypoints=https"
      - "traefik.http.routers.resepsiyonistim.tls=true"
      - "traefik.http.routers.resepsiyonistim.tls.certresolver=letsencrypt"
      - "traefik.http.services.resepsiyonistim.loadbalancer.server.port=3000"