version: '3.8'

services:
  bungalow-panel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bungalow-panel.rule=Host(`panel.merman.sbs`) || Host(`owner.merman.sbs`) || Host(`api.merman.sbs`)"
      - "traefik.http.routers.bungalow-panel.entrypoints=https"
      - "traefik.http.routers.bungalow-panel.tls=true"
      - "traefik.http.routers.bungalow-panel.tls.certresolver=letsencrypt"
      - "traefik.http.services.bungalow-panel.loadbalancer.server.port=80"
