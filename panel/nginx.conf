# ──────────────────────────────────────────────────────────────────────────────
# nginx.conf — Resepsiyonistim (Security Hardened)
#
# Production nginx configuration for resepsiyonistim.com / www.resepsiyonistim.com
# Serves Next.js static export with comprehensive security headers.
# ──────────────────────────────────────────────────────────────────────────────

# Run as non-root
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Hide nginx version ──────────────────────────────────────────────────
    server_tokens off;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 1m;  # Limit request body size (auth payloads are small)
    client_body_buffer_size 16k;

    # ── Rate Limiting Zones ──────────────────────────────────────────────────
    # Login/auth: 5 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    # General API: 60 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # Global: 120 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=120r/m;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── Security Headers Map (applied to ALL responses) ─────────────────────
    map $sent_http_content_type $referrer_policy {
        default "strict-origin-when-cross-origin";
    }

    server {
        listen 80;
        server_name panel.merman.sbs owner.merman.sbs api.merman.sbs concierge.merman.sbs;

        root /usr/share/nginx/html;
        index index.html;

        # ── Global Security Headers ─────────────────────────────────────────
        # Applied to every response via add_header (note: add_header in server
        # context is inherited by location blocks ONLY if the location block
        # doesn't define its own add_header directives. We use 'always' to
        # ensure headers are sent even on error responses.)

        # HSTS — enforce HTTPS for 2 years with subdomains
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Prevent clickjacking
        add_header X-Frame-Options "DENY" always;

        # Disable legacy XSS auditor (modern browsers use CSP)
        add_header X-XSS-Protection "0" always;

        # Control referrer information
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Restrict browser features
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

        # DNS prefetch
        add_header X-DNS-Prefetch-Control "on" always;

        # Cross-origin isolation
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;

        # Prevent Adobe/Flex cross-domain policy requests
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.iyzipay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.supabase.in https://sandbox-api.iyzipay.com https://api.iyzipay.com; frame-src https://sandbox-api.iyzipay.com https://api.iyzipay.com https://*.iyzipay.com; object-src 'none'; base-uri 'self'; form-action 'self' https://*.iyzipay.com; frame-ancestors 'none'; upgrade-insecure-requests" always;

        # ── CORS Configuration ──────────────────────────────────────────────
        # Only allow same-origin requests. Explicitly deny cross-origin access
        # to API endpoints. The panel talks to Supabase directly from the browser,
        # so no cross-origin API access is needed.

        # ── Global Rate Limiting ─────────────────────────────────────────────
        limit_req zone=global_limit burst=30 nodelay;
        limit_req_status 429;

        # ── Health Endpoint (no rate limit, no auth) ────────────────────────
        location = /health {
            try_files /health.json =404;
            add_header Content-Type "application/json" always;
            add_header Cache-Control "no-cache" always;
            # Re-add security headers (location block overrides server block)
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        }

        # ── Auth Endpoints (strict rate limit) ──────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;

            # Return 404 for auth token endpoint (no local auth backend)
            return 404 '{"error": "Not found"}';
            add_header Content-Type "application/json" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        }

        # ── API Routes (rate limited) ───────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            try_files $uri $uri.json =404;
            # Re-add security headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ── n8n Webhook Proxy (rate limited, authenticated) ────────────────
        # Proxies POST requests to n8n for owner-action-confirm webhook.
        # This enables same-origin requests from the reservation-action page,
        # avoiding CSP connect-src issues.
        # The n8n webhook validates HMAC tokens server-side.
        location /api/n8n/ {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;

            # Only allow POST for owner-action-confirm
            if ($request_method !~ ^(POST|OPTIONS)$) {
                return 405 '{"error": "Method not allowed"}';
            }

            proxy_pass https://n8n.merman.sbs/webhook/;
            proxy_set_header Host n8n.merman.sbs;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_ssl_server_name on;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;

            # Security headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ── Next.js Static Assets (long cache, immutable) ───────────────────
        location /_next/static/ {
            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            # Re-add security headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            access_log off;
        }

        # ── Static Files (images, fonts, etc.) ──────────────────────────────
        location ~* \.(svg|png|jpg|jpeg|gif|webp|ico|woff2?|ttf|eot|map)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            access_log off;
        }

        # ── Auth Pages (never cache) ────────────────────────────────────────
        location ~ ^/(login|onboarding|auth|reservation-action) {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            # Re-add security headers
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.iyzipay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.supabase.in https://sandbox-api.iyzipay.com https://api.iyzipay.com; frame-src https://sandbox-api.iyzipay.com https://api.iyzipay.com https://*.iyzipay.com; object-src 'none'; base-uri 'self'; form-action 'self' https://*.iyzipay.com; frame-ancestors 'none'; upgrade-insecure-requests" always;

            try_files $uri $uri.html $uri/ /index.html;
        }

        # ── Protected Dashboard Pages (never cache) ─────────────────────────
        location ~ ^/(dashboard|reservations|payments|messages|settings|analytics|ai|subscription) {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            # Re-add security headers
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.iyzipay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.supabase.in https://sandbox-api.iyzipay.com https://api.iyzipay.com; frame-src https://sandbox-api.iyzipay.com https://api.iyzipay.com https://*.iyzipay.com; object-src 'none'; base-uri 'self'; form-action 'self' https://*.iyzipay.com; frame-ancestors 'none'; upgrade-insecure-requests" always;

            try_files $uri $uri.html $uri/ /index.html;
        }

        # ── Default: SPA fallback ───────────────────────────────────────────
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # ── Block hidden files ──────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Custom error pages ──────────────────────────────────────────────
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
