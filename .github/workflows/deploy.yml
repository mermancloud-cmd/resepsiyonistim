# Deploy artık Coolify tarafından otomatik yapılır.
# Coolify, bu repo'yu izler ve main branch'e push yapıldığında
# Docker build + deploy işlemini otomatik başlatır.
#
# Bu workflow yalnızca build validation için çalışır —
#kod derleniyor mu kontrol eder, deploy yapmaz.

name: Build Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: panel/package-lock.json

      - name: Install dependencies
        working-directory: panel
        run: npm ci

      - name: Build check (standalone)
        working-directory: panel
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build success
        run: echo "✅ Build başarılı — Coolify auto-deploy devreye girecek"